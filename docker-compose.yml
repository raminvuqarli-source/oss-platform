version: "3.8"

services:

  nginx:
    image: nginx:alpine
    container_name: oss_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - oss_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oss_app
    restart: always
    environment:
      - DATABASE_URL=postgresql://oss:osspassword@postgres:5432/ossdb
      - NODE_ENV=production
      - PORT=5000
      - SESSION_SECRET=${SESSION_SECRET:-oss-change-this-secret-in-dotenv-file}
      - EPOINT_MERCHANT_ID=${EPOINT_MERCHANT_ID:-}
      - EPOINT_PRIVATE_KEY=${EPOINT_PRIVATE_KEY:-}
      - EPOINT_PUBLIC_KEY=${EPOINT_PUBLIC_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - APP_BASE_URL=${APP_BASE_URL:-}
      - BASE_URL=${BASE_URL:-}
      - ONESIGNAL_REST_API_KEY=${ONESIGNAL_REST_API_KEY:-}
      - VITE_ONESIGNAL_APP_ID=${VITE_ONESIGNAL_APP_ID:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENABLE_DEMO=${ENABLE_DEMO:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5000"
    networks:
      - oss_network

  postgres:
    image: postgres:15
    container_name: oss_postgres
    restart: always
    environment:
      POSTGRES_USER: oss
      POSTGRES_PASSWORD: osspassword
      POSTGRES_DB: ossdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oss -d ossdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - oss_network

volumes:
  postgres_data:

networks:
  oss_network:
    driver: bridge
