version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oss_app
    restart: always
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - oss_network

  postgres:
    image: postgres:15
    container_name: oss_postgres
    restart: always
    environment:
      POSTGRES_USER: oss
      POSTGRES_PASSWORD: osspassword
      POSTGRES_DB: ossdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oss -d ossdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oss_network

volumes:
  postgres_data:

networks:
  oss_network:
    driver: bridge
