version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    container_name: oss_app
    restart: always
    depends_on:
      - postgres
    expose:
      - "5000"
    networks:
      - oss_network

  postgres:
    image: postgres:15
    container_name: oss_postgres
    restart: always
    environment:
      POSTGRES_USER: oss
      POSTGRES_PASSWORD: osspassword
      POSTGRES_DB: ossdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oss_network

  nginx:
    image: nginx:latest
    container_name: oss_nginx
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - oss_network

volumes:
  postgres_data:

networks:
  oss_network:
    driver: bridge
